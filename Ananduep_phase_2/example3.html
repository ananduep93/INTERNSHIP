
<html>
<head>
  <title>Example 3</title>
  <style>
    body {
      background-color: lightcyan;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 60px;   
    }

    h2 {
      color: darkgreen;
    }

    .box {
      background-color: steelblue;
      color: white;
      font-size: 18px;
      font-weight: bold;
      width: 300px;
      margin: 20px auto;
      border: 3px solid navy;
    }

    .box1 { padding: 5px;  }
    .box2 { padding: 20px; }
    .box3 { padding: 50px; }   
  </style>
</head>
<body>

  <h2>Example 3 - padding </h2>

  <div class="box box1">padding: 5px</div>
  <div class="box box2">padding: 20px</div>
  <div class="box box3">padding: 50px</div>
</body>
</html>
