<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>even or odd </title>
</head>
<body>
   <div class="container">
    <h1>Check Even Or Odd </h1> 
    <input type="number" required placeholder="Enter a Number " id="inp">
    <br>
    <button type="button" onclick="display()">Click to enter</button>
    <h1 id="output"></h1>
   </div>
<script>
    function display(){
        var num=Number(document.getElementById("inp").value)

        if(num%2==0){
            document.getElementById("output").innerHTML="Entered number is even"
        }else{
            document.getElementById("output").innerHTML="Entered number is odd"
        }
    }
</script>
<style>

body{
    margin-top: 90px;
    height: 60vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container{
    width: 400px;
    height: 300px;
    padding: 20px;
    border: 2px solid black;
    border-radius: 20px;
    text-align: center;
    background-color: aliceblue;
}
h1{
    font-family: 'poppins',sans-serif;
}

button{
    width: 170px;
      background-color: aqua;
      border: 2px solid black;
      padding: 12px 28px;
      border: none;
      font-size: 15px;
      border-radius: 20px;
      color: blue;
}

button:hover{
    background-color: blue;
    color: white;
}

input{
    width: 170px;
    display: flex;
    height: 40px;
    text-align: center;
    border-radius: 20px;
    padding: 12px;
    margin-left: 100px;
}
</style>
</body>
</html>
