<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form </title>
</head>
<body>
    <h4><a href="Index.html"><button>Back To Profile</button></a></h4>
    <hr>
    <h1>Registration Form </h1>
    <form>
        <label>Full Name: <span class="required">*</span></label>
        <br>
        <input type="text" name="username" required placeholder="Enter your full name" minlength="3" maxlength="10" pattern="[a-zA-Z\s]+" >
        <br>
        <br>
        <label>Age: <span class="required">*</span></label>
        <br>
        <input type="number" name="age" required placeholder="age" min="0" max="100">
        <br>
        <br>
        <label>Email: <span class="required">*</span></label>
        <br>
        <input type="email" name="email" required placeholder="Enter your email">
        <br>
        <br>
        <label>Password: <span class="required">*</span></label>
        <br>
        <input type="password" name="password" required placeholder="Enter your password" minlength="4" maxlength="6">
        <br>
        <br>
        
        <label>Gender: <span class="required">*</span></label>
        <br>
        <br>
        <input type="radio" name="gender" value="male" required>
        <label>Male </label>
        <input type="radio" name="gender" value="female" required>
        <label>Female </label>
        <br>
        <br>
        <label>Select Hobbies <span class="required">*</span></label>
        <br>
        <br>
        <input type="checkbox">
        <label>Playing </label>
        <input type="checkbox">
        <label>Dancing</label>
        <input type="checkbox">
        <label>Studying</label>
        <br>
        <br>
        <input type="submit" value="save">

    </form>
    <hr>    
    <footer style="text-align: center">
        <h4>©️ 2026 personal profile page .All rights reserved </h4>
    </footer>
</body>
</html>
