<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login form </title>
</head>
<body>
    <h4><a href="Index.html"><button>Back To Profile</button></a></h4>
    <hr>
    <h1>Login</h1>
    <form>
        <label>User Name: <span class="required">*</span></label>
        <br>
        <input type="text" name="username" required placeholder="Enter your username" minlength="3" maxlength="10" pattern="[a-zA-Z\s]+">
        <br>
        <br>
        <label>Password: <span class="required">*</span></label>
        <br>
        <input type="password" name="password" required placeholder="Enter your password" minlength="4" maxlength="6">
        <br>
        <br>
        <input type="submit" value="login">
        <input type="submit" value="cancel">
    </form>
