<!DOCTYPE html>
<html>
<head>
  <title>Card Sample</title>
  <style>
    body {
      background-color: lightgray;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 60px;
    }

    h2 {
      color: darkblue;
    }

    .card {
      background-color: white;
      width: 300px;
      margin: 40px auto;        
      padding: 20px;            
      border: 3px solid steelblue; 
    }


    .card p {
      color: gray;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .card button {
      background-color: steelblue;
      color: white;
      border: 1px solid black;
      padding: 10px 20px;     
      font-size: 14px;
      border-radius: 5px;
    }
    
    .card img{
        width: 250px;
    }

  </style>
</head>
<body>

  <h2>Card Sample</h2>

  <div class="card">
    <div >
      <img src="icon-512.png">
    </div>

    <h2>INFINITY KIT</h2>
    <p>Daily life tools in one website.</p>
    <button><a href="https://www.infinitykit.online/">Read More</a></button>
  </div>

</body>
</html>
